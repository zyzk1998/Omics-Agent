<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生信大模型智能体 · 架构与数据流</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --canvas-bg: #f0f4f8;
      --grid-line: rgba(100, 116, 139, 0.07);
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --card: #ffffff;
      --wire: rgba(148, 163, 184, 0.65);
      --shadow-node: 0 6px 20px rgba(15, 23, 42, 0.06);
      --online: #15803d;
      --offline: #b91c1c;
      --busy: #b45309;
      --accent: #0f766e;
      --node-size: 120px;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      font-family: Inter, Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f8f9fa;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .stage {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      background-color: var(--canvas-bg);
      background-image:
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
        linear-gradient(var(--grid-line) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .title-bar {
      flex-shrink: 0;
      padding: 14px 20px;
      border-bottom: 1px solid #e5e7eb;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(6px);
    }

    .title-bar h1 {
      font-size: clamp(15px, 1.8vw, 18px);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .board-wrap {
      flex: 1;
      padding: 16px 16px 112px;
      max-width: 1440px;
      margin: 0 auto;
      width: 100%;
    }

    .main-board {
      display: grid;
      grid-template-columns: minmax(0, 1fr) min(400px, 100%);
      gap: 16px;
      align-items: start;
    }

    .canvas-col {
      min-width: 0;
    }

    .canvas {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      min-height: 360px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fafbfc;
      box-shadow: var(--shadow-node);
      overflow: hidden;
    }

    /* 动态箭头层（whotowork 式：脉冲路径 + 中点标题 + 简要弹框） */
    #synapse-dyn {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 6;
      pointer-events: none;
      overflow: visible;
    }

    #synapse-dyn path.synapse-base-dyn {
      fill: none;
      stroke: #94a3b8;
      stroke-width: 5;
      opacity: 0.22;
      vector-effect: non-scaling-stroke;
    }

    /* 常亮数据流：稳定描边 + 微光，不做「流光一闪」 */
    #synapse-dyn path.synapse-pulse-dyn {
      fill: none;
      stroke: #0d9488;
      stroke-width: 2.75;
      stroke-dasharray: none;
      vector-effect: non-scaling-stroke;
      opacity: 1;
      filter: drop-shadow(0 0 4px rgba(13, 148, 136, 0.5));
    }

    #synapse-dyn .synapse-float-label {
      font-size: 11px;
      font-weight: 700;
      fill: #0f172a;
      text-anchor: middle;
      dominant-baseline: middle;
      paint-order: stroke;
      stroke: #ffffff;
      stroke-width: 3.5px;
      pointer-events: none;
    }

    .arrow-callout {
      position: absolute;
      z-index: 14;
      max-width: min(260px, 42vw);
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      background: rgba(255, 255, 255, 0.97);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      font-size: 12px;
      line-height: 1.5;
      color: #334155;
      transform: translate(-50%, calc(-100% - 14px));
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .arrow-callout.visible {
      opacity: 1;
    }

    .arrow-callout .ac-title {
      font-weight: 700;
      font-size: 12px;
      color: #0f172a;
      margin-bottom: 6px;
      padding-bottom: 6px;
      border-bottom: 1px solid #e2e8f0;
    }

    .canvas svg.connectors {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .canvas svg.connectors .solid {
      fill: none;
      stroke: var(--wire);
      stroke-width: 1.25;
      vector-effect: non-scaling-stroke;
    }

    .canvas svg.connectors .dash {
      fill: none;
      stroke: var(--wire);
      stroke-width: 1;
      stroke-dasharray: 4 5;
      vector-effect: non-scaling-stroke;
      opacity: 0.9;
    }

    .canvas svg.connectors .flow {
      fill: none;
      stroke: #94a3b8;
      stroke-width: 1.25;
      stroke-dasharray: 6 10;
      stroke-dashoffset: 0;
      opacity: 0;
      vector-effect: non-scaling-stroke;
    }

    .canvas svg.connectors .flow.on {
      opacity: 0.45;
      animation: flow-line 1.1s linear infinite;
    }

    @keyframes flow-line {
      to { stroke-dashoffset: -32; }
    }

    .nodes {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
    }

    .node {
      position: absolute;
      width: var(--node-size);
      height: var(--node-size);
      margin-left: calc(var(--node-size) / -2);
      margin-top: calc(var(--node-size) / -2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow-node);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-align: center;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .node-icon { color: #374151; line-height: 0; }
    .node-icon svg { display: block; }

    .node-title {
      font-size: 14px;
      font-weight: 700;
      color: #1f2937;
      max-width: 6em;
      line-height: 1.2;
    }

    .node-status {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--online);
    }

    .node-status.is-offline { color: var(--offline); }
    .node-status.is-busy { color: var(--busy); }

    .node.is-pulse {
      animation: node-pulse 0.55s ease-in-out 2;
    }

    .node.is-hot {
      border-color: var(--accent);
      box-shadow: 0 8px 28px rgba(15, 118, 110, 0.12);
    }

    .node.is-warn,
    .node.node-offline {
      border-color: #fca5a5;
    }

    @keyframes node-pulse {
      50% {
        border-color: #9ca3af;
        box-shadow: 0 10px 32px rgba(15, 23, 42, 0.1);
      }
    }

    .pos-user { left: 16%; top: 24%; }
    .pos-router { left: 44%; top: 24%; }
    .pos-orch { left: 18%; top: 52%; }
    .pos-local { left: 36%; top: 52%; }
    .pos-worker { left: 54%; top: 52%; }
    .pos-storage { left: 72%; top: 52%; }
    .pos-cluster { left: 54%; top: 78%; }

    /* 右侧：whotowork 式 Master-Detail（企业浅色版） */
    .detail-panel {
      background: #fafbfc;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px 18px;
      position: sticky;
      top: 12px;
      max-height: calc(100vh - 140px);
      overflow: auto;
      box-shadow: var(--shadow-node);
    }

    .detail-panel h2 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 2px solid #ccfbf1;
    }

    .step-badge {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
      letter-spacing: 0.04em;
    }

    .detail-item {
      margin-bottom: 14px;
    }

    .detail-item-label {
      font-weight: 600;
      font-size: 11px;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .detail-item-value {
      font-size: 13px;
      line-height: 1.65;
      color: #1e293b;
      background: #fff;
      padding: 10px 12px;
      border-radius: 6px;
      border-left: 3px solid var(--accent);
      word-break: break-word;
    }

    .detail-item-value code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      background: #f1f5f9;
      padding: 2px 5px;
      border-radius: 4px;
      color: #0f172a;
    }

    .detail-item-value ul {
      margin: 8px 0 0 18px;
    }

    .detail-item-value li {
      margin-bottom: 4px;
    }

    details.flow-acc {
      margin-top: 10px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    details.flow-acc > summary {
      list-style: none;
      cursor: pointer;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 600;
      color: #334155;
      user-select: none;
    }

    details.flow-acc > summary::-webkit-details-marker {
      display: none;
    }

    details.flow-acc > summary::before {
      content: "▸ ";
      color: var(--accent);
    }

    details.flow-acc[open] > summary::before {
      content: "▾ ";
    }

    .flow-acc-body {
      padding: 0 12px 12px;
      font-size: 12px;
      line-height: 1.65;
      color: #475569;
      border-top: 1px solid #f1f5f9;
    }

    .dock {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 40;
      padding: 10px 16px 14px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(0deg, rgba(248, 250, 252, 0.98), rgba(248, 250, 252, 0.92));
      border-top: 1px solid #e5e7eb;
    }

    .dock-meta {
      width: 100%;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .dock button {
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      padding: 10px 18px;
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      color: var(--text);
      background: #fff;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .dock button:hover:not(:disabled) {
      border-color: #94a3b8;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.06);
    }

    .dock button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }

    .dock button.primary {
      background: #0f766e;
      border-color: #0f766e;
      color: #fff;
    }

    .dock button.primary:hover:not(:disabled) {
      background: #0d9488;
      border-color: #0d9488;
    }

    .dock button.ghost {
      background: #f9fafb;
    }

    @media (max-width: 960px) {
      .main-board {
        grid-template-columns: 1fr;
      }
      .detail-panel {
        position: relative;
        top: 0;
        max-height: none;
      }
    }

    @media (max-width: 720px) {
      :root { --node-size: 100px; }
      .node-title { font-size: 12px; }
      .pos-user { left: 14%; top: 20%; }
      .pos-router { left: 50%; top: 20%; }
      .pos-orch { left: 14%; top: 46%; }
      .pos-local { top: 46%; left: 38%; }
      .pos-worker { top: 46%; left: 62%; }
      .pos-storage { left: 86%; top: 46%; }
      .pos-cluster { left: 50%; top: 74%; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <header class="title-bar">
      <h1>生信大模型智能体 · 架构与数据流</h1>
    </header>

    <div class="board-wrap">
      <div class="main-board">
        <div class="canvas-col">
          <div class="canvas" id="blueprint" aria-label="架构拓扑">
            <svg id="synapse-dyn" viewBox="0 0 1000 625" preserveAspectRatio="none" aria-hidden="true"></svg>
            <div id="arrow-callout" class="arrow-callout" role="tooltip" hidden></div>
            <svg class="connectors" viewBox="0 0 1000 625" preserveAspectRatio="none" aria-hidden="true">
              <defs>
                <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
                  <path d="M0,0 L8,4 L0,8 Z" fill="#94a3b8" />
                </marker>
              </defs>
              <path class="solid" marker-end="url(#arrow)" d="M 210 150 L 360 150" />
              <path class="dash" d="M 440 210 L 440 270" />
              <path class="dash" d="M 440 270 L 180 300" />
              <path class="dash" d="M 440 270 L 360 300" />
              <path class="dash" d="M 440 270 L 540 300" />
              <path class="dash" d="M 440 270 L 720 300" />
              <path class="dash" d="M 540 340 L 540 470" />
              <path id="path-flow" class="flow" d="M 540 500 L 210 150" />
            </svg>

            <div class="nodes">
              <div class="node pos-user" id="mod-user" role="img" aria-label="用户输入，在线">
                <div class="node-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                  </svg>
                </div>
                <span class="node-title">用户输入</span>
                <span class="node-status">ONLINE</span>
              </div>

              <div class="node pos-router" id="mod-router" role="img" aria-label="语义路由，在线">
                <div class="node-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="18" cy="5" r="3" />
                    <circle cx="6" cy="12" r="3" />
                    <circle cx="18" cy="19" r="3" />
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
                  </svg>
                </div>
                <span class="node-title">语义路由</span>
                <span class="node-status">ONLINE</span>
              </div>

              <div class="node pos-orch" id="mod-orch" role="img" aria-label="编排中枢，在线">
                <div class="node-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2 2 7l10 5 10-5-10-5z" />
                    <path d="M2 17l10 5 10-5M2 12l10 5 10-5" />
                  </svg>
                </div>
                <span class="node-title">编排中枢</span>
                <span class="node-status">ONLINE</span>
              </div>

              <div class="node pos-local" id="mod-local" role="img" aria-label="本地算子，在线">
                <div class="node-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="16 18 22 12 16 6" />
                    <polyline points="8 6 2 12 8 18" />
                  </svg>
                </div>
                <span class="node-title">本地算子</span>
                <span class="node-status">ONLINE</span>
              </div>

              <div class="node pos-worker" id="mod-worker" role="img" aria-label="算力服务，在线">
                <div class="node-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="4" width="16" height="16" rx="2" ry="2" />
                    <rect x="9" y="9" width="6" height="6" />
                    <path d="M9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 14h3M1 9h3M1 14h3" />
                  </svg>
                </div>
                <span class="node-title">算力服务</span>
                <span class="node-status">ONLINE</span>
              </div>

              <div class="node pos-storage" id="mod-storage" role="img" aria-label="数据存储，在线">
                <div class="node-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
                  </svg>
                </div>
                <span class="node-title">数据存储</span>
                <span class="node-status">ONLINE</span>
              </div>

              <div class="node pos-cluster node-offline" id="mod-cluster" role="img" aria-label="超算作业，离线">
                <div class="node-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="6" rx="1" />
                    <rect x="2" y="14" width="20" height="6" rx="1" />
                    <path d="M6 6h.01M6 17h.01" />
                  </svg>
                </div>
                <span class="node-title">超算作业</span>
                <span class="node-status is-offline" id="cluster-status-label">OFFLINE</span>
              </div>
            </div>
          </div>
        </div>

        <aside class="detail-panel" id="detail-panel" aria-live="polite">
          <div class="step-badge" id="step-badge"></div>
          <div id="detail-body"></div>
        </aside>
      </div>
    </div>

    <footer class="dock">
      <div class="dock-meta" id="dock-meta"></div>
      <button type="button" class="ghost" id="btn-prev" disabled>上一步</button>
      <button type="button" class="primary" id="btn-next">开始演练</button>
      <button type="button" class="ghost" id="btn-reset">重置</button>
    </footer>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <script>
(function () {
  var blueprint = document.getElementById("blueprint");
  var synapseDyn = document.getElementById("synapse-dyn");
  var arrowCallout = document.getElementById("arrow-callout");
  var detailBody = document.getElementById("detail-body");
  var stepBadge = document.getElementById("step-badge");
  var dockMeta = document.getElementById("dock-meta");
  var btnPrev = document.getElementById("btn-prev");
  var btnNext = document.getElementById("btn-next");
  var btnReset = document.getElementById("btn-reset");
  var flowPath = document.getElementById("path-flow");
  var clusterLabel = document.getElementById("cluster-status-label");
  var clusterNode = document.getElementById("mod-cluster");

  var nodeIds = ["mod-user", "mod-router", "mod-orch", "mod-local", "mod-worker", "mod-cluster", "mod-storage"];
  var nodes = {};
  nodeIds.forEach(function (id) {
    nodes[id] = document.getElementById(id);
  });

  var stepIndex = -1;
  var animating = false;
  var defsInstalled = false;

  function center(el) {
    var br = blueprint.getBoundingClientRect();
    var r = el.getBoundingClientRect();
    return {
      x: r.left - br.left + r.width / 2,
      y: r.top - br.top + r.height / 2,
    };
  }

  function normFromClient(pt) {
    var br = blueprint.getBoundingClientRect();
    return {
      x: (pt.x / br.width) * 1000,
      y: (pt.y / br.height) * 625,
    };
  }

  function normCenterNode(id) {
    return normFromClient(center(nodes[id]));
  }

  function bezierPoint(t, p0, p1, p2, p3) {
    var u = 1 - t;
    var u2 = u * u;
    var u3 = u2 * u;
    var t2 = t * t;
    var t3 = t2 * t;
    return {
      x: u3 * p0.x + 3 * u2 * t * p1.x + 3 * u * t2 * p2.x + t3 * p3.x,
      y: u3 * p0.y + 3 * u2 * t * p1.y + 3 * u * t2 * p2.y + t3 * p3.y,
    };
  }

  function buildCurvePath(p0, p1) {
    var dx = p1.x - p0.x;
    var dy = p1.y - p0.y;
    var midX = (p0.x + p1.x) / 2;
    var midY = (p0.y + p1.y) / 2;
    var c1x;
    var c1y;
    var c2x;
    var c2y;
    if (Math.abs(dy) > Math.abs(dx)) {
      c1x = p0.x + dx * 0.2;
      c1y = p0.y + dy * 0.3;
      c2x = p1.x - dx * 0.2;
      c2y = p1.y - dy * 0.3;
    } else {
      c1x = midX - dy * 0.28;
      c1y = midY + dx * 0.28;
      c2x = midX + dy * 0.28;
      c2y = midY - dx * 0.28;
    }
    var d = "M " + p0.x + " " + p0.y + " C " + c1x + " " + c1y + ", " + c2x + " " + c2y + ", " + p1.x + " " + p1.y;
    var mid = bezierPoint(0.5, p0, { x: c1x, y: c1y }, { x: c2x, y: c2y }, p1);
    return { d: d, mid: mid, c1: { x: c1x, y: c1y }, c2: { x: c2x, y: c2y } };
  }

  function ensureDynDefs() {
    if (defsInstalled) return;
    defsInstalled = true;
    var defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
    var m = document.createElementNS("http://www.w3.org/2000/svg", "marker");
    m.setAttribute("id", "arrowhead-dyn");
    m.setAttribute("markerWidth", "9");
    m.setAttribute("markerHeight", "9");
    m.setAttribute("refX", "8");
    m.setAttribute("refY", "4.5");
    m.setAttribute("orient", "auto");
    var mp = document.createElementNS("http://www.w3.org/2000/svg", "path");
    mp.setAttribute("d", "M0,0 L9,4.5 L0,9 Z");
    mp.setAttribute("fill", "#0d9488");
    m.appendChild(mp);
    defs.appendChild(m);
    synapseDyn.appendChild(defs);
  }

  function clearDynSynapse() {
    while (synapseDyn.lastChild) {
      synapseDyn.removeChild(synapseDyn.lastChild);
    }
    defsInstalled = false;
  }

  function hideCallout() {
    arrowCallout.classList.remove("visible");
    arrowCallout.hidden = true;
    arrowCallout.innerHTML = "";
  }

  function showCalloutAtNorm(mid, title, brief) {
    arrowCallout.removeAttribute("hidden");
    arrowCallout.innerHTML =
      "<div class=\"ac-title\"></div><div class=\"ac-body\"></div>";
    arrowCallout.querySelector(".ac-title").textContent = title || "";
    arrowCallout.querySelector(".ac-body").textContent = brief || "";
    arrowCallout.style.left = (mid.x / 1000) * 100 + "%";
    arrowCallout.style.top = (mid.y / 625) * 100 + "%";
    requestAnimationFrame(function () {
      arrowCallout.classList.add("visible");
    });
  }

  function drawSynapseArrow(fromId, toId, label, brief) {
    clearDynSynapse();
    hideCallout();
    var a = nodes[fromId];
    var b = nodes[toId];
    if (!a || !b) return;
    ensureDynDefs();
    var p0 = normCenterNode(fromId);
    var p1 = normCenterNode(toId);
    var geo = buildCurvePath(p0, p1);

    var base = document.createElementNS("http://www.w3.org/2000/svg", "path");
    base.setAttribute("d", geo.d);
    base.setAttribute("class", "synapse-base-dyn");
    synapseDyn.appendChild(base);

    var pulse = document.createElementNS("http://www.w3.org/2000/svg", "path");
    pulse.setAttribute("d", geo.d);
    pulse.setAttribute("class", "synapse-pulse-dyn");
    pulse.setAttribute("marker-end", "url(#arrowhead-dyn)");
    synapseDyn.appendChild(pulse);

    if (label) {
      var txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
      txt.setAttribute("class", "synapse-float-label");
      txt.setAttribute("x", String(geo.mid.x));
      txt.setAttribute("y", String(geo.mid.y - 14));
      txt.textContent = label;
      synapseDyn.appendChild(txt);
    }

    showCalloutAtNorm(geo.mid, label || "数据流", brief || "");
  }

  function moveDot(fromId, toId) {
    return new Promise(function (resolve) {
      if (typeof anime === "undefined") {
        resolve();
        return;
      }
      var a = nodes[fromId];
      var b = nodes[toId];
      if (!a || !b) {

      var p0 = center(a);
      var p1 = center(b);
      var dot = document.createElement("div");
      dot.setAttribute("aria-hidden", "true");
      dot.style.cssText =
        "position:absolute;z-index:9;width:9px;height:9px;border-radius:50%;" +
        "background:#fff;border:1px solid #64748b;box-shadow:0 1px 4px rgba(15,23,42,.1);" +
        "pointer-events:none;margin:-4px 0 0 -4px;";
      blueprint.appendChild(dot);
      dot.style.left = p0.x + "px";
      dot.style.top = p0.y + "px";
      anime({
        targets: dot,
        left: [p0.x + "px", p1.x + "px"],
        top: [p0.y + "px", p1.y + "px"],
        duration: 780,
        easing: "easeInOutQuad",

          resolve();
        },

    if (typeof prev.onPlay === "function" && (!prev.anim || !prev.anim.length)) {
      drawSynapseArrow("mod-storage", "mod-user", prev.arrowLabel || "", prev.arrowBrief || "");
      return;
    }
    if (!prev.anim || !prev.anim.length) {
      clearDynSynapse();
      hideCallout();
      return;
    }
    var lastPair = prev.anim[prev.anim.length - 1];
    var li = prev.anim.length - 1;
    var lab = Array.isArray(prev.arrowLabel) ? prev.arrowLabel[li] : prev.arrowLabel;
    var br = Array.isArray(prev.arrowBrief) ? prev.arrowBrief[li] : prev.arrowBrief;
    drawSynapseArrow(lastPair[0], lastPair[1], lab || "", br || "");

        var lab = Array.isArray(s.arrowLabel) ? s.arrowLabel[i] : s.arrowLabel;

    dockMeta.textContent = s.noAnim
      ? "本步无粒子动画；点「下一步」将直接进入下一说明。"
      : "点「下一步」将播放本步粒子，并在箭头上常亮显示步骤名与弹框摘要，直至下一步再切换。";

    setHot(s.hot, false);
    syncClusterForViewStep(stepIndex);
    restorePersistentArrowForView(stepIndex);

    if (stepIndex >= steps.length - 1) {
      btnNext.textContent = "下一步（完成并重置）";
    } else {
      btnNext.textContent = "下一步";
    }
    btnNext.disabled = false;
    refreshNavButtons();
  }

  function applyStepEnter() {
    if (stepIndex < 1) resetClusterOffline();
  }

  function onNextClick() {
    if (animating) return;
    if (typeof anime === "undefined" && stepIndex >= 0 && !steps[stepIndex].noAnim) {
      window.alert("动画库未能加载，请检查网络后重试。");
      return;
    }

    if (stepIndex < 0) {
      stepIndex = 0;
      applyStepEnter();
      renderStep();
      return;
    }

    var s = steps[stepIndex];
    animating = true;
    btnNext.disabled = true;
    btnPrev.disabled = true;

    runStepAnim(s)
      .then(function () {
        if (typeof s.afterAnim === "function") return s.afterAnim();
        return Promise.resolve();
      })
      .then(function () {
        if (stepIndex >= steps.length - 1) {
          fullReset();
          return;
        }
        stepIndex += 1;
        applyStepEnter();
        renderStep();
      })
      .catch(function (e) {
        console.error(e);
        clearDynSynapse();
        hideCallout();
        btnNext.disabled = false;
        refreshNavButtons();
      })
      .finally(function () {
        animating = false;
        refreshNavButtons();
      });
  }

  function onPrevClick() {
    if (animating) return;
    if (stepIndex < 0) return;
    if (stepIndex === 0) {
      stepIndex = -1;
      clearDynSynapse();
      hideCallout();
      clearHot();
      resetClusterOffline();
      renderStep();
      return;
    }
    stepIndex -= 1;
    applyStepEnter();
    renderStep();
  }

  function fullReset() {
    stepIndex = -1;
    animating = false;
    clearDynSynapse();
    hideCallout();
    clearHot();
    resetClusterOffline();
    renderStep();
  }

  btnPrev.addEventListener("click", onPrevClick);
  btnNext.addEventListener("click", onNextClick);
  btnReset.addEventListener("click", fullReset);

  renderStep();
})();
  </script>
</body>
</html>
