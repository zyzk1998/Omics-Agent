services:
  # =========================================
  # 0. 用户与资产中台 - MySQL（Phase 1 数据库基建）
  # =========================================
  mysql:
    image: mysql:8.0
    container_name: gibh_v2_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-omics_agent_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-omics_agent}
      MYSQL_USER: ${MYSQL_USER:-omics}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-omics_agent_pwd}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - gibh-network
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================
  # 1. 消息队列 - Redis
  # =========================================
  redis:
    image: redis:7-alpine
    container_name: gibh_v2_redis
    restart: always
    volumes:
      - ./data/redis:/data
    networks:
      - gibh-network
    command: redis-server --appendonly yes

  # =========================================
  # 2. API 服务器 - FastAPI + Gunicorn（直接暴露端口）
  # =========================================
  api-server:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    image: gibh-v2-api:latest
    container_name: gibh_v2_api
    restart: always
    ports:
      - "8028:8028"  # 直接暴露 API 服务器端口
    environment:
      - TZ=Asia/Shanghai
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=/app/uploads
      - RESULTS_DIR=/app/results
      - PYTHONPATH=/app
      # 🔒 安全：从环境变量读取 API 密钥，不要硬编码
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - SILICONFLOW_MODEL=${SILICONFLOW_MODEL:-deepseek-ai/DeepSeek-R1}
      # 🔒 安全：文件上传限制
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-104857600}
      # 🔒 安全：CORS 配置
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      # 修复 Numba 和 Matplotlib 权限问题
      - NUMBA_CACHE_DIR=/home/appuser/.cache/numba
      - MPLCONFIGDIR=/home/appuser/.config/matplotlib
      - HOME=/home/appuser
      # 禁用 Numba 缓存调试（帮助解决缓存问题）
      - NUMBA_DEBUG_CACHE=1
      # Phase 1: MySQL 连接（可选，未配置时应用仍可启动）
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE:-omics_agent}
      - MYSQL_USER=${MYSQL_USER:-omics}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-omics_agent_pwd}
      # JWT 不随容器重启失效：从宿主机 .env 或挂载文件读取，不绑定容器
      - SECRET_KEY=${SECRET_KEY:-}
      - SECRET_KEY_FILE=${SECRET_KEY_FILE:-}
    volumes:
      - .:/app
      - ./data/uploads:/app/uploads
      - ./results:/app/results
      - ./data:/app/data
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - gibh-network
    # 🔧 修复：使用 entrypoint 脚本修复权限
    entrypoint: ["/entrypoint.sh"]
    command: gunicorn server:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8028 --timeout 300

  # =========================================
  # 3. Nginx 反向代理服务器（可选，推荐生产环境）
  # =========================================
  nginx:
    image: nginx:alpine
    container_name: gibh_v2_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"  # 如果需要 HTTPS
    volumes:
      - ./services/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./services/nginx/html:/usr/share/nginx/html:ro
      - ./data/uploads:/app/uploads:ro  # 上传文件目录（只读）
      - ./results:/app/results:ro        # 分析结果目录（只读）
    depends_on:
      - api-server
    networks:
      - gibh-network

  # =========================================
  # 4. 异步任务处理 - Celery Worker（可选）
  # =========================================
  worker:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    image: gibh-v2-api:latest
    container_name: gibh_v2_worker
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=/app/uploads
      - RESULTS_DIR=/app/results
      - PYTHONPATH=/app
      # 🔒 安全：从环境变量读取 API 密钥
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - SILICONFLOW_MODEL=${SILICONFLOW_MODEL:-deepseek-ai/DeepSeek-R1}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-104857600}
      # 修复 Numba 和 Matplotlib 权限问题
      - NUMBA_CACHE_DIR=/home/appuser/.cache/numba
      - MPLCONFIGDIR=/home/appuser/.config/matplotlib
      - HOME=/home/appuser
      # 禁用 Numba 缓存调试（帮助解决缓存问题）
      - NUMBA_DEBUG_CACHE=1
    volumes:
      - .:/app
      - ./data/uploads:/app/uploads
      - ./results:/app/results
      - ./data:/app/data
      - /etc/localtime:/etc/localtime:ro
    # 🔧 修复：在容器启动时修复挂载目录的权限
    entrypoint: |
      sh -c "
        # 修复挂载目录的权限（确保 appuser 可以写入）
        chown -R appuser:appuser /app/uploads /app/results /app/data 2>/dev/null || true
        # 执行原始命令
        exec celery -A gibh_agent.core.celery_app worker --loglevel=info --concurrency=4
      "
    networks:
      - gibh-network
    command: celery -A gibh_agent.core.celery_app worker --loglevel=info --concurrency=4

networks:
  gibh-network:
    driver: bridge

volumes:
  mysql_data:
  redis-data:
    driver: local

