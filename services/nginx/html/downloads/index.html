<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下载桌面客户端 · Omics Agent</title>
    <link rel="icon" type="image/png" href="/static/favicon.png?v=10">
    <style>
        :root { --fg: #1f2937; --muted: #6b7280; --accent: #2563eb; --bg: #f9fafb; --card: #fff; }
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", sans-serif; margin: 0; color: var(--fg); background: var(--bg); line-height: 1.5; }
        .wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 3rem; }
        h1 { font-size: 1.35rem; font-weight: 600; margin: 0 0 0.35rem; }
        .ver-line { color: var(--muted); font-size: 0.95rem; margin: 0 0 1.5rem; }
        .card { background: var(--card); border-radius: 12px; padding: 1.25rem 1.35rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 1rem; }
        .btn { display: inline-block; padding: 0.65rem 1.1rem; background: var(--accent); color: #fff !important; text-decoration: none; border-radius: 8px; font-weight: 500; font-size: 0.95rem; }
        .btn:hover { filter: brightness(1.06); }
        .btn[disabled], .btn.missing { background: #9ca3af; pointer-events: none; cursor: not-allowed; }
        .note { font-size: 0.85rem; color: var(--muted); margin-top: 1rem; display: none; }
        .back { margin-bottom: 1.25rem; }
        .back a { color: var(--accent); text-decoration: none; font-size: 0.9rem; }
        .back a:hover { text-decoration: underline; }
        .card-h { font-size: 1rem; font-weight: 600; margin: 0 0 0.75rem; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="back"><a href="/">← 返回首页</a></div>
        <h1>下载桌面客户端</h1>
        <p class="ver-line" id="ver-line">版本 —</p>

        <div class="card">
            <div class="card-h">Windows（64 位）</div>
            <a id="win-dl" class="btn" href="#" download>下载 Windows 安装包</a>
            <p id="win-missing" class="note">暂无可用的安装包，请稍后再试。</p>
        </div>

        <div class="card">
            <div class="card-h">Linux（x86_64）</div>
            <a id="linux-dl" class="btn" href="#" download>下载 Linux AppImage</a>
            <p id="linux-missing" class="note">暂无可用的安装包，请稍后再试。</p>
        </div>
    </div>
    <script>
        (function () {
            var base = '/downloads/';
            function probe(url, onOk, onFail) {
                var xhr = new XMLHttpRequest();
                xhr.open('HEAD', url, true);
                xhr.onload = function () { (xhr.status >= 200 && xhr.status < 400) ? onOk() : onFail(); };
                xhr.onerror = onFail;
                xhr.send();
            }
            function fileUrl(name) {
                return base + encodeURIComponent(name);
            }
            var winA = document.getElementById('win-dl');
            var linuxA = document.getElementById('linux-dl');
            var verLine = document.getElementById('ver-line');

            var staticFallback = {
                version: '0.11.0',
                displayVersion: 'V0.11',
                productName: 'Omics Agent',
                winSetupFile: 'Omics Agent Setup 0.11.0.exe',
                linuxAppImageFile: 'Omics Agent-0.11.0.AppImage'
            };

            function setVersion(meta) {
                if (!verLine) return;
                var dv = meta.displayVersion || ('V' + meta.version);
                var v = meta.version || '';
                verLine.textContent = '当前版本 ' + dv + '（' + v + '）';
            }

            function run(meta) {
                setVersion(meta);
                /** 只链接 client-release.json 中的确切文件名，不回退旧包，避免「页上 0.11、实际下 1.0.0」 */
                var winUrl = meta.winSetupFile ? fileUrl(meta.winSetupFile) : '';
                if (winA) {
                    if (!winUrl) {
                        winA.classList.add('missing');
                        winA.setAttribute('href', '#');
                        winA.removeAttribute('download');
                        winA.textContent = '暂不可下载';
                        var w0 = document.getElementById('win-missing');
                        if (w0) w0.style.display = 'block';
                    } else {
                        probe(winUrl, function () {
                            winA.classList.remove('missing');
                            winA.setAttribute('href', winUrl);
                            winA.setAttribute('download', '');
                            winA.textContent = '下载 Windows 安装包';
                        }, function () {
                            winA.classList.add('missing');
                            winA.setAttribute('href', '#');
                            winA.removeAttribute('download');
                            winA.textContent = '暂不可下载';
                            var wm = document.getElementById('win-missing');
                            if (wm) {
                                wm.textContent = '服务器上尚未提供与当前版本一致的安装包（' + (meta.winSetupFile || '') + '）。';
                                wm.style.display = 'block';
                            }
                        });
                    }
                }

                var linuxUrl = meta.linuxAppImageFile ? fileUrl(meta.linuxAppImageFile) : '';
                if (linuxA) {
                    if (!linuxUrl) {
                        linuxA.classList.add('missing');
                        linuxA.setAttribute('href', '#');
                        linuxA.removeAttribute('download');
                        linuxA.textContent = '暂不可下载';
                        var l0 = document.getElementById('linux-missing');
                        if (l0) l0.style.display = 'block';
                    } else {
                        probe(linuxUrl, function () {
                            linuxA.classList.remove('missing');
                            linuxA.setAttribute('href', linuxUrl);
                            linuxA.setAttribute('download', '');
                            linuxA.textContent = '下载 Linux AppImage';
                        }, function () {
                            linuxA.classList.add('missing');
                            linuxA.setAttribute('href', '#');
                            linuxA.removeAttribute('download');
                            linuxA.textContent = '暂不可下载';
                            var lm = document.getElementById('linux-missing');
                            if (lm) {
                                lm.textContent = '服务器上尚未提供与当前版本一致的安装包（' + (meta.linuxAppImageFile || '') + '）。';
                                lm.style.display = 'block';
                            }
                        });
                    }
                }
            }

            fetch(base + 'client-release.json?t=' + Date.now(), { cache: 'no-store' })
                .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
                .then(function (j) { run(j); })
                .catch(function () { run(staticFallback); });
        })();
    </script>
</body>
</html>
