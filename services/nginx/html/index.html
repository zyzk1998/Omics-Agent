            }
            
            const { workflowData, originalQuery } = cached;
            console.log('📂 [Template Upload] 从缓存获取数据，原始查询:', originalQuery);
            
            // 保存到全局变量（用于上传完成后的回调）
            window.pendingWorkflowData = workflowData;
            window.pendingOriginalQuery = originalQuery;
            
            // 触发文件输入框
            const fileInput = document.getElementById('fileInput');
            if (fileInput) {
                // 创建一次性事件处理器
                const handleFileSelect = async function(event) {
                    if (event.target.files && event.target.files.length > 0) {
                        console.log('📂 [Template Upload] 文件已选择，准备上传并重新发送查询');
                        // 移除事件处理器（避免重复触发）
                        fileInput.removeEventListener('change', handleFileSelect);
                        
                        // 文件选择后，自动上传并重新发送查询
                        await handleTemplateUploadComplete(event.target.files, originalQuery, workflowData);
                    }
                };
                
                fileInput.addEventListener('change', handleFileSelect, { once: true });
                fileInput.click();
            } else {
                console.error('❌ [Template Upload] 未找到文件输入框');
                alert('错误：未找到文件输入框，请刷新页面重试');
            }
        };
        
        // 🔥 SYSTEM REFACTOR: 处理模板上传完成后的自动重新发送
        async function handleTemplateUploadComplete(files, originalQuery, workflowData) {
            try {
                console.log('📤 [Template Upload] 开始上传文件...', files);
                
                // 上传文件
                const formData = new FormData();
                for (let file of files) {
                    formData.append('files', file);
                }
                
                const uploadRes = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                
                if (!uploadRes.ok) {
                    const errorText = await uploadRes.text();
                    throw new Error(errorText || '文件上传失败');
                }
                
                const uploadResult = await uploadRes.json();
                console.log('🔥 [Template Upload] 上传结果:', uploadResult);
                
                // 🔥 CRITICAL FIX: 健壮地提取服务器路径（处理字符串或数组）
                let serverPath = "";
                if (Array.isArray(uploadResult.file_paths) && uploadResult.file_paths.length > 0) {
                    serverPath = uploadResult.file_paths[0];
                } else if (uploadResult.file_path) {
                    serverPath = uploadResult.file_path;
                } else if (typeof uploadResult.file_paths === 'string') {
                    serverPath = uploadResult.file_paths;
                }
                
                if (!serverPath) {
                    console.error('❌ [Template Upload] 上传响应中没有有效的文件路径:', uploadResult);
                    alert("上传失败: 服务器未返回文件路径。");
                    return;
                }
                
                // 🔥 CRITICAL FIX: 强制更新全局状态（清除旧状态，避免重复或过期状态）
                const fileName = serverPath.split('/').pop() || serverPath.split('\\').pop() || 'uploaded_data.csv';
                        const fileInfo = {
                            name: fileName,
                    path: serverPath  // 🔥 CRITICAL: 使用服务器返回的完整路径
                        };
                
                // 强制替换全局状态（而不是追加）
                uploadedFiles = [fileInfo];
                console.log('✅ [Template Upload] 强制更新全局 uploadedFiles:', uploadedFiles);
                console.log('✅ [Template Upload] 文件路径详情:', fileInfo);
                
                // 🔥 CRITICAL FIX: 获取原始查询（从缓存或参数）
                const queryToSend = originalQuery || window.pendingOriginalQuery || userInput.value.trim();
                if (!queryToSend) {
                    console.error('❌ [Template Upload] 无法获取原始查询');
                    alert('错误：无法获取原始查询，请重新输入');
                    return;
                }
                
                console.log('🔄 [Template Upload] 准备重新发送查询:', queryToSend);
                userInput.value = queryToSend;
                
                // 🔥 CRITICAL: 立即发送，显式传递文件列表
                // 不依赖默认的 sendMessage 行为读取 DOM 或全局状态
                console.log('🚀 [Template Upload] 调用 sendMessage，显式传递文件:', [fileInfo]);
                sendMessage(null, queryToSend, null, null, false, [fileInfo]);
                
            } catch (e) {
                console.error('❌ [Template Upload] 上传失败:', e);
                alert(`文件上传失败: ${e.message}`);
            }
        }

        function submitWorkflow(formId, totalSteps, filePathsJson = '[]') {
            // 🔥 Task 1: Retrieve file_paths from hidden input (fallback to parameter, then global context)
            let filePaths = [];
            const formContainer = document.getElementById(formId);
            
            // First: Try to get from hidden input
            if (formContainer) {
                const hiddenInput = formContainer.querySelector(`#hidden-file-paths-${formId}`);
                if (hiddenInput && hiddenInput.value) {
                    try {
                        filePaths = JSON.parse(hiddenInput.value.replace(/&quot;/g, '"'));
                        console.log('📁 从隐藏输入获取文件路径:', filePaths);
                    } catch (e) {
                        console.warn('Failed to parse file paths from hidden input:', e);
                    }
                }
            }
            
            // Fallback 1: Try to parse from function parameter
            if (filePaths.length === 0) {
                try {
                    filePaths = JSON.parse(filePathsJson.replace(/&quot;/g, '"'));
                    console.log('📁 从函数参数获取文件路径:', filePaths);
                } catch (e) {
                    console.warn('Failed to parse file paths from parameter:', e);
                }
            }
            
            // Fallback 2: Use global uploadedFiles context
            if (filePaths.length === 0 && uploadedFiles.length > 0) {
                filePaths = uploadedFiles.map(f => f.path || f.file_path || f.name).filter(p => p);
                console.log('📁 从全局上下文获取文件路径:', filePaths);
            }
            
            // 检查是否有文件
            if (filePaths.length === 0 && uploadedFiles.length === 0) { 
                alert("⚠️ 请先上传数据文件再执行工作流！"); 
                document.getElementById('fileInput')?.click(); 
                return; 
            }
            
            // formContainer 已在上面声明，这里只需要验证
            if (!formContainer) {
                alert("❌ 无法找到工作流表单！");
                return;
            }
            
            const stepsData = [];
            const checkboxes = formContainer.querySelectorAll('.step-checkbox');
            
            checkboxes.forEach((cb, i) => {
                if (cb.checked) {
                    const toolIdInput = formContainer.querySelector(`input[name="tool_id_${i}"]`);
                    const stepNameInput = formContainer.querySelector(`input[name="step_name_${i}"]`);
                    const stepIdInput = formContainer.querySelector(`input[name="step_id_${i}"]`);
                    
                    if (!toolIdInput || !stepNameInput) {
                        console.warn(`步骤 ${i} 缺少必要字段，跳过`);
                        return;
                    }
                    
                    const toolId = toolIdInput.value;
                    const stepName = stepNameInput.value;
                    const stepId = stepIdInput ? stepIdInput.value : toolId;
                    
                    // 收集参数
                    const params = {};
                    const inputs = formContainer.querySelectorAll(`[name^="param_${i}_"]`);
                    inputs.forEach(input => {
                        const originalName = input.name.replace(`param_${i}_`, '');
                        if (input.type === 'checkbox') {
                            params[originalName] = input.checked;
                        } else if (input.type === 'select-one') {
                            params[originalName] = input.value;
                        } else {
                            // 尝试转换数字
                            const value = input.value.trim();
                            if (value === '') {
                                params[originalName] = null;
                            } else if (!isNaN(value) && value !== '') {
                                params[originalName] = Number(value);
                            } else {
                                params[originalName] = value;
                            }
                        }
                    });
                    
                    stepsData.push({
                        step_id: stepId,
                        tool_id: toolId,
                        name: stepName,
                        desc: stepName, // 使用名称作为描述
                        params: params
                    });
                }
            });
            
            if (stepsData.length === 0) { 
                alert("请至少选择一个步骤！"); 
                return; 
            }
            
            const btn = formContainer.querySelector('button.btn-run');
            if (btn) {
                btn.disabled = true;
                btn.innerText = "⏳ 工作流执行中...";
            }
            
            // 🔥 V2: 发送工作流执行请求
            // 🔧 修复：确保 file_paths 是有效的路径数组
            let finalFilePaths = [];
            if (filePaths.length > 0) {
                finalFilePaths = filePaths;
            } else if (uploadedFiles.length > 0) {
                finalFilePaths = uploadedFiles.map(f => f.path || f.file_path || f.name).filter(p => p);
            }
            
            console.log('📁 工作流执行 - 文件路径:', finalFilePaths);
            
            // 🔥 CRITICAL REGRESSION FIX: Construct workflow_data payload correctly
            const workflowPayload = {
                workflow_data: {
                workflow_name: formContainer.querySelector('h5')?.textContent?.replace('📋 ', '') || '工作流',
                    steps: stepsData
                },
                file_paths: finalFilePaths  // 🔧 修复：确保传递有效的文件路径数组
            };
            
            console.log('🚀 [submitWorkflow] 发送工作流执行请求:', workflowPayload);
            
            // 使用 sendMessage 发送工作流执行请求
            sendMessage(null, "执行工作流", null, workflowPayload);
        }

            appendMessage('ai', formHtml, null, null, true);
        }

        function submitToolForm(formId, toolInfo) {
            const formContainer = document.getElementById(formId);
            const inputs = formContainer.querySelectorAll('input, select');
            const params = {};
            inputs.forEach(input => { if (input.type === 'checkbox') params[input.name] = input.checked; else params[input.name] = input.value; });
            const btn = formContainer.querySelector('button'); btn.disabled = true; btn.innerText = "已提交...";
            sendMessage(toolInfo, `Run ${toolInfo.name} with params`, params);
        }

        function renderDataSelector(datasets) {
            const selectorId = `ds-${Date.now()}`;
            let html = `<div class="data-selector-container" id="${selectorId}"><div class="data-selector-header"><i class="bi bi-folder2-open"></i> 选择 Galaxy 历史数据</div><div class="data-selector-list">`;
            datasets.forEach(d => { html += `<div class="dataset-item" onclick="toggleCheckbox(this)"><input type="checkbox" class="form-check-input" value="${d.id}" data-name="${d.name}" onclick="event.stopPropagation(); toggleCheckbox(this.parentElement, true)"><div class="dataset-info"><span class="dataset-name">${d.hid}: ${d.name}</span><span class="dataset-meta">${d.ext} | ${d.size}</span></div></div>`; });
            html += `</div><div class="data-selector-footer"><button class="btn btn-primary btn-sm" onclick="submitDataSelection('${selectorId}')">确认使用 <i class="bi bi-check2"></i></button></div></div>`;
            appendMessage('ai', html, null, null, true);
        }

        function toggleCheckbox(row, fromCheckbox = false) {
            const checkbox = row.querySelector('input[type="checkbox"]');
            if (!fromCheckbox) checkbox.checked = !checkbox.checked;
            if(checkbox.checked) row.classList.add('selected'); else row.classList.remove('selected');
        }

        function submitDataSelection(selectorId) {
            const container = document.getElementById(selectorId);
            const checkboxes = container.querySelectorAll('input:checked');
            if (checkboxes.length === 0) { alert("请至少选择一个文件"); return; }
            uploadedFiles = []; let selectedNames = [];
            checkboxes.forEach(cb => { const name = cb.getAttribute('data-name'); uploadedFiles.push({ id: cb.value, name: name }); selectedNames.push(name); });
            const btn = container.querySelector('button'); btn.disabled = true; btn.innerText = "已选择";
            const userMsg = `我已选择以下文件：\n${selectedNames.join('\n')}\n\n请基于这些文件，继续规划 Seurat 单细胞分析工作流。`;
            appendMessage('user', userMsg);
            sendMessage(null, "已选择文件，请继续规划 Seurat 单细胞工作流", null, null, true);
        }

        function formatExecutionResult(text) {
            text = text.trim();
            let tableHtml = '<div class="props-panel">';
            let hasData = false;
            if (text.startsWith('{') && text.endsWith('}')) {
                try {
                    let jsonStr = text.replace(/'/g, '"').replace(/\bFalse\b/g, 'false').replace(/\bTrue\b/g, 'true').replace(/\bNone\b/g, 'null');
                    const obj = JSON.parse(jsonStr);
                    for (const [key, value] of Object.entries(obj)) {
                        hasData = true;
                        const displayValue = (typeof value === 'object' && value !== null) ? JSON.stringify(value) : value;
                        tableHtml += `<div class="prop-row"><div class="prop-key">${key}</div><div class="prop-value">${displayValue}</div></div>`;
                    }
                } catch (e) { console.warn("Dict parse failed"); }
            }
            if (!hasData) {
                const lines = text.split('\n');
                lines.forEach(line => {
                    const match = line.match(/^\s*([^:]+):\s*(.*)$/);
                    if (match) {
                        hasData = true;
                        tableHtml += `<div class="prop-row"><div class="prop-key">${match[1].trim()}</div><div class="prop-value">${match[2].trim()}</div></div>`;
                    }
                });
            }
            tableHtml += '</div>';
            return hasData ? `<h6>✅ 执行结果</h6>${tableHtml}` : `<h6>✅ 执行结果</h6><pre>${text}</pre>`;
        }

        function toggleCode(btn) {
            const container = btn.nextElementSibling;
            if (container.style.display === 'block') { container.style.display = 'none'; btn.innerHTML = '<i class="bi bi-code-slash"></i> 查看策略代码'; }
            else { container.style.display = 'block'; btn.innerHTML = '<i class="bi bi-chevron-up"></i> 收起代码'; }
        }

        function toggleThought(header) {
            const content = header.nextElementSibling;
            if (content.classList.contains('open')) {
                content.classList.remove('open');
                header.querySelector('i').className = 'bi bi-stars';
            } else {
                content.classList.add('open');
                header.querySelector('i').className = 'bi bi-chevron-down';
            }
        }

        function copyText(btn) {
            let text = "";
            const container = btn.closest('.message-container');
            if (container) {
                text = container.querySelector('.bubble').innerText;
            }
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => {
                    const icon = btn.querySelector('i');
                    if(icon) { const originalClass = icon.className; icon.className = 'bi bi-check'; setTimeout(() => icon.className = originalClass, 2000); }
                });
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed"; textArea.style.left = "-9999px";
                document.body.appendChild(textArea); textArea.focus(); textArea.select();
                try { document.execCommand('copy'); } catch (err) {}
                document.body.removeChild(textArea);
            }
        }

        function editMessage(btn) {
            const container = btn.closest('.message-container');
            const text = container.querySelector('.bubble').innerText;
            userInput.value = text; userInput.focus(); autoResize(userInput); checkInput();
        }
        
        // 🔥 TASK 5: 参数推荐切换函数
        window.toggleParameterRecommendations = function(formId, useRecommended) {
            const form = document.getElementById(`workflow-form-${formId}`);
            if (!form) {
                console.error(`❌ [toggleParameterRecommendations] 未找到表单: workflow-form-${formId}`);
                return;
            }
            
            const toggleBtn = document.getElementById(`toggle-params-btn-${formId}`);
            const paramInputs = form.querySelectorAll('.param-input[data-recommended-value]');
            
            paramInputs.forEach(input => {
                const defaultValue = input.dataset.defaultValue;
                const recommendedValue = input.dataset.recommendedValue;
                
                if (useRecommended && recommendedValue) {
                    // 切换到推荐值
                    input.value = recommendedValue;
                    input.style.backgroundColor = '#fff3cd'; // 高亮显示
                } else {
                    // 切换回默认值
                    input.value = defaultValue;
                    input.style.backgroundColor = ''; // 恢复默认背景
                }
            });
            
            // 更新按钮文本和状态
            if (toggleBtn) {
                toggleBtn.textContent = useRecommended ? '切换回默认参数' : '使用推荐参数';
                toggleBtn.className = useRecommended ? 'btn btn-sm btn-secondary' : 'btn btn-sm btn-primary';
                toggleBtn.onclick = () => toggleParameterRecommendations(formId, !useRecommended);
                toggleBtn.dataset.useRecommended = String(useRecommended);
            }
            
            console.log(`✅ [toggleParameterRecommendations] 参数已${useRecommended ? '切换到推荐值' : '切换回默认值'}`);
        };

        function selectTool(tool, query) { appendMessage('user', `我选择运行: <b>${tool.name}</b>`); sendMessage(tool, query); }
        function scrollToBottom() { chatScrollArea.scrollTop = chatScrollArea.scrollHeight; }
    </script>
</body>
