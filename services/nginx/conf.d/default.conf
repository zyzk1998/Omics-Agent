upstream backend_api {
    server api-server:8028;
}

server {
    listen 80;
    server_name localhost;

    # 1. Markdown 等静态文档：禁止 SPA 回退到 index.html（避免 /API.md 被当成整页 HTML 代码块渲染）
    location ~* \.(md|markdown)$ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        default_type text/markdown;
        charset utf-8;
    }

    # 2. 前端静态页面
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 3. API 接口转发
    location /api/ {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 显式透传浏览器 JWT / 访客头；默认 nginx 会转发 Authorization，显式写出避免被其它 include 改写时丢失
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Guest-UUID $http_x_guest_uuid;
        
        # 大文件上传支持
        client_max_body_size 10G;
        proxy_read_timeout 1200s;
        proxy_send_timeout 1200s;
        proxy_connect_timeout 75s;

        # 🔥 SSE 流式传输优化（CRITICAL）
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;              # 禁用缓冲（关键）
        proxy_cache off;                  # 禁用缓存（关键）
        chunked_transfer_encoding on;    # 启用分块传输编码（关键）
        tcp_nodelay on;                   # 禁用 Nagle 算法
        proxy_no_cache 1;                 # 不缓存响应
        proxy_cache_bypass 1;             # 绕过缓存
    }

    # 4. 静态资源服务 - 上传文件
    location /uploads/ {
        alias /app/uploads/;
        autoindex on;
        expires 1d;
    }

    # 5. 静态资源服务 - 分析结果
    location /results/ {
        alias /app/results/;
        autoindex on;
        expires 1d;
    }
}

